name: cavi
# Execute a partir do diretório deploy/ (ou aponte -f deploy/docker-compose.yml).
# O contexto de build é a RAIZ do repositório, pois o Dockerfile multi-stage
# precisa de frontend/ (build do SPA) e backend/ (API FastAPI).
services:
  web:
    container_name: cavi.ifes.site
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8411:8411"
    restart: unless-stopped
    environment:
      # Banco SQLite dentro do volume persistente (ver volume cavi_data abaixo).
      DATABASE_PATH: /app/data/dados.db
    # Persiste o banco SQLite e os uploads entre recriações do container.
    volumes:
      - cavi_data:/app/data
      - cavi_uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8411/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  cavi_data:
    name: deploy_cavi_data
  cavi_uploads:
    name: deploy_cavi_uploads
